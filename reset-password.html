                </div>
            </div>

    <nav>

            </ul>

    <main>
        <div class="container">
            <section class="section">
                <h2 class="section-title">密码重置</h2>
                <div class="nes-container with-title is-centered" style="max-width: 600px; margin: 0 auto;">
                    <h3 class="title">身份验证与密码重置</h3>
                    <form id="resetPasswordForm" class="admin-form">
                        <div class="form-message" id="formMessage"></div>
                        
                        <div class="nes-field">
                            <label for="username">用户名 <span class="required">*</span></label>
                            <input type="text" id="username" class="nes-input" placeholder="请输入您的用户名" required>
                        </div>
                        
                        <div class="nes-field">
                            <label for="old_password">原密码 <span class="required">*</span></label>
                            <input type="password" id="old_password" class="nes-input" placeholder="请输入您的原密码" required>
                        </div>
                        
                        <div class="nes-field">
                            <label for="jhtuid">简幻通UID <span class="required">*</span></label>
                            <input type="number" id="jhtuid" class="nes-input" placeholder="请输入您的简幻通UID" required>
                        </div>
                        
                        <div class="nes-field">
                            <label for="verify_code">简幻通验证码 <span class="required">*</span></label>
                            <input type="number" id="verify_code" class="nes-input" placeholder="请输入简幻通验证码" required>
                            <p class="map-hint">验证码获取方式：打开简幻通小程序查看</p>
                        </div>
                        
                        <div class="nes-field">
                            <label for="new_password">新密码 <span class="required">*</span></label>
                            <input type="password" id="new_password" class="nes-input" placeholder="请输入新密码（至少6个字符）" required>
                        </div>
                        
                        <div class="nes-field">
                            <label for="confirm_password">确认新密码 <span class="required">*</span></label>
                            <input type="password" id="confirm_password" class="nes-input" placeholder="请再次输入新密码" required>
                        </div>
                        
                        <div class="form-actions">
                            <button type="button" id="backButton" class="nes-btn cancel-btn">返回</button>
                            <button type="submit" id="submitButton" class="nes-btn is-primary">重置密码</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>

                <div class="footer-section">

    <div class="global-loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 表单提交处理
            const resetPasswordForm = document.getElementById('resetPasswordForm');
            const formMessage = document.getElementById('formMessage');
            const loading = document.getElementById('loading');
            const backButton = document.getElementById('backButton');
            const submitButton = document.getElementById('submitButton');

            // 返回按钮点击事件
            backButton.addEventListener('click', function() {
                window.history.back();
            });

            // 表单提交事件
            resetPasswordForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 获取表单数据
                const username = document.getElementById('username').value.trim();
                const oldPassword = document.getElementById('old_password').value;
                const newPassword = document.getElementById('new_password').value;
                const confirmPassword = document.getElementById('confirm_password').value;
                const jhtuid = parseInt(document.getElementById('jhtuid').value);
                const verifyCode = parseInt(document.getElementById('verify_code').value);

                // 验证表单
                if (!username || !oldPassword || !newPassword || !confirmPassword || !jhtuid || !verifyCode) {
                    showMessage('请填写所有必填项', 'error');
                    return;
                }

                if (newPassword.length < 6) {
                    showMessage('新密码至少需要6个字符', 'error');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    showMessage('两次输入的新密码不一致', 'error');
                    return;
                }

                // 显示加载动画
                loading.style.display = 'flex';
                submitButton.disabled = true;

                // 发送请求到API
                fetch('/api/v1/auth.php?action=reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        old_password: oldPassword,
                        new_password: newPassword,
                        jhtuid: jhtuid,
                        verify_code: verifyCode
                    })
                })
                .then(response => response.json())
                .then(data => {
                    loading.style.display = 'none';
                    submitButton.disabled = false;
                    
                    if (data.success) {
                        showMessage('密码重置成功！请使用新密码登录', 'success');
                        // 3秒后跳转到首页
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 3000);
                    } else {
                        showMessage(data.error || '密码重置失败，请稍后重试', 'error');
                    }
                })
                .catch(error => {
                    loading.style.display = 'none';
                    submitButton.disabled = false;
                    showMessage('网络错误，请稍后重试', 'error');
                    console.error('Error:', error);
                });
            });

            // 显示消息函数
            function showMessage(message, type) {
                formMessage.textContent = message;
                formMessage.className = 'form-message ' + type;
                formMessage.style.display = 'block';
                
                // 3秒后自动隐藏消息
                setTimeout(() => {
                    formMessage.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>

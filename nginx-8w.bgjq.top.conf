# ============================================================
# 8W社区 Nginx 配置
# 部署路径：/etc/nginx/sites-available/8w.bgjq.top
# 启用方式：ln -s /etc/nginx/sites-available/8w.bgjq.top /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    listen [::]:80;

    server_name 8w.bgjq.top;
    root /var/www/8w.bgjq.top;
    index index.php index.html;

    # ============================================================
    # 主路由
    # ============================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================================
    # 美化 URL 路由
    # ============================================================
    location /world-news {
        try_files $uri $uri/ /world-news.php?$query_string;
    }

    location /parliament {
        try_files $uri $uri/ /parliament.php?$query_string;
    }

    location /assembly {
        try_files $uri $uri/ /assembly.php?$query_string;
    }

    location /court {
        try_files $uri $uri/ /court.php?$query_string;
    }

    location /services {
        try_files $uri $uri/ /services.php?$query_string;
    }

    location = /complaint {
        return 301 https://suggest.bgjq.top/;
    }

    location = /sitemap {
        try_files /sitemap.xml =404;
        add_header Content-Type "application/xml; charset=utf-8";
    }

    location /admin {
        try_files $uri $uri/ /admin.html;
    }

    # API 管理页面
    location = /api-manager {
        try_files $uri $uri/ /api-manager.php?$query_string;
    }

    location = /api-docs {
        try_files $uri $uri/ /api-docs.html;
    }

    # ============================================================
    # API 路由
    # ============================================================
    location /api/ {
        try_files $uri $uri/ /api/$1.php?$query_string;
    }

    # 公开 API 路由（带 ID 参数）
    location /api/v1/public/ {
        rewrite ^/api/v1/public/([^/]+)/(\d+)$ /api/v1/public/$1.php?id=$2 last;
        rewrite ^/api/v1/public/([^/]+)$ /api/v1/public/$1.php last;
    }

    # ============================================================
    # 旧 URL 重定向
    # ============================================================
    location = /services.html {
        return 301 /services;
    }

    location = /trade-publish.html {
        return 301 https://trade.bgjq.top/;
    }

    location = /trade-publish.php {
        return 301 https://trade.bgjq.top/;
    }

    # ============================================================
    # Robots
    # ============================================================
    location = /robots.txt {
        try_files $uri =404;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # ============================================================
    # PHP 处理（PHP 8.4）
    # ============================================================
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ============================================================
    # 静态文件缓存
    # ============================================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # 安全头
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ============================================================
    # 隐藏文件保护
    # ============================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}